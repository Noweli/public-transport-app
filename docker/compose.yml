services:
  postgres:
    image: docker.io/library/postgres:18
    container_name: local-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: public-transport
    ports: 
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql:Z
    restart: always
  
  redis:
    image: docker.io/library/redis:8.6.3
    container_name: local-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data:Z
    restart: always
  
  prometheus:
    image: docker.io/prom/prometheus:v3
    container_name: local-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-otlp-receiver'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:Z
      - prom-data:/prometheus:Z
    restart: always
    
volumes:
  pg-data:
  redis-data:
  prom-data: